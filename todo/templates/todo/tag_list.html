{% extends "todo/base.html" %}
{% block content %}
    <div class="content-header">
        <h1>Tags</h1>
        <a href="{% url 'todo:tag-create' %}" class="btn-add">Add</a>
    </div>
    <table class="tags-table">
        <thead>
            <tr>
                <th style="width: 40%;">Name</th>
                <th style="width: 30%;">Update</th>
                <th style="width: 30%;">Delete</th>
            </tr>
        </thead>
        <tbody>
            {% for tag in tags %}
                <tr>
                    <td>{{ tag.name }}</td>
                    <td>
                        <a href="{% url 'todo:tag-update' tag.id %}" class="btn-action">Update</a>
                    </td>
                    <td>
                        <a href="{% url 'todo:tag-delete' tag.id %}" class="btn-action">Delete</a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="3" style="text-align: center; color: #999;">No tags found.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock content %}
