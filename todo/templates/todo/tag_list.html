{% extends 'todo/base.html' %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Теги</h2>
        <a href="{% url 'todo:tag-create' %}" class="btn btn-primary">+ Добавить тег</a>
    </div>
    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Название тега</th>
                <th style="width: 200px;">Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for tag in tags %}
                <tr>
                    <td>{{ tag.name }}</td>
                    <td>
                        <a href="{% url 'todo:tag-update' tag.id %}"
                           class="btn btn-sm btn-outline-dark">Update</a>
                        <a href="{% url 'todo:tag-delete' tag.id %}"
                           class="btn btn-sm btn-outline-danger">Delete</a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="2">Теги не найдены.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock content %}
