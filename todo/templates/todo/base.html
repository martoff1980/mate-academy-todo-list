<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Todo List</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet">
    </head>
    <body>
        <div class="container-fluid">
            <div class="row">
                <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar vh-100 p-3 border-end">
                    <h3>📌 Меню</h3>
                    <ul class="nav flex-column mt-3">
                        <li class="nav-item mb-2">
                            <a class="nav-link btn btn-outline-primary text-start w-100"
                               href="{% url 'todo:index' %}">🏠 Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-outline-secondary text-start w-100"
                               href="{% url 'todo:tag-list' %}">🏷️ Tags</a>
                        </li>
                    </ul>
                </nav>
                <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 pt-4">
                    {% block content %}{% endblock %}
                </main>
            </div>
        </div>
    </body>
</html>
