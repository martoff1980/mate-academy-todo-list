{% extends "todo/base.html" %}
{% block content %}
  <h2>Save element</h2>
  <form method="post" class="mt-3" style="max-width: 500px;">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Save</button>
    <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock content %}
